services:
  - type: web
    name: haya-shield-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        fromDatabase:
          name: haya-shield-db
          property: connectionString
      # Set these manually in the Render dashboard:
      # JWT_SECRET
      # CLIENT_ORIGIN  (your Vercel frontend URL)
